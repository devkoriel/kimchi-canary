name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Deploy Worker
        if: env.CLOUDFLARE_API_TOKEN != ''
        run: npm run deploy

      - name: Explain skipped deploy
        if: env.CLOUDFLARE_API_TOKEN == ''
        run: echo "Set the CLOUDFLARE_API_TOKEN repository secret to enable automatic Cloudflare deploys."
